<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>GULISTORY · оплата</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f4f7f2;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 1rem;
      color: #2d3a2c;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .app-container { max-width: 480px; width: 100%; }
    .header { text-align: center; margin-bottom: 1.5rem; padding-top: 1rem; }
    .header h1 { font-size: 2.2rem; font-weight: 400; letter-spacing: 5px; color: #3a5a3a; text-transform: uppercase; font-family: 'Times New Roman', Georgia, serif; }
    .header .subtitle { font-size: 0.85rem; color: #6b8b6b; letter-spacing: 3px; border-top: 1px solid #c8dac8; padding-top: 0.5rem; display: inline-block; }
    
    .admin-panel { background: #eaf1e8; border-radius: 20px; padding: 0.8rem 1rem; margin-bottom: 1.5rem; border: 1px solid #c0d4c0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.6rem; }
    .admin-toggle { background: #fff; border: 1.5px solid #5a7a5a; color: #3a5a3a; padding: 0.35rem 1rem; border-radius: 30px; cursor: pointer; }
    .admin-toggle.active { background: #4a6a4a; color: #fff; }
    
    .card { background: #fff; border: 1px solid #dce8dc; border-radius: 24px; padding: 1rem; margin-bottom: 1.4rem; box-shadow: 0 8px 24px rgba(60,80,60,0.06); }
    .product-image { width: 100%; height: 220px; background-size: cover; background-position: center; border-radius: 18px; margin-bottom: 0.9rem; display: flex; align-items: center; justify-content: center; font-size: 4rem; background-color: #eaf2e8; position: relative; overflow: hidden; }
    .product-emoji { z-index: 2; pointer-events: none; }
    .product-badge { position: absolute; top: 10px; right: 12px; background: #ffffffdd; padding: 0.25rem 0.8rem; border-radius: 20px; font-size: 0.7rem; color: #4a6a4a; z-index: 3; }
    .product-title { font-size: 1.25rem; font-weight: 500; display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.2rem; flex-wrap: wrap; gap: 0.5rem; }
    .price { font-size: 1.15rem; font-weight: 500; color: #3a5a3a; background: #edf5ed; padding: 0.25rem 0.9rem; border-radius: 30px; }
    .description { color: #6b7d6b; font-size: 0.9rem; margin: 0.5rem 0 1rem; padding-left: 0.8rem; border-left: 2px solid #b4ccb4; }
    .details-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
    .material-tag { color: #8aa08a; font-size: 0.8rem; background: #f4f8f2; padding: 0.25rem 0.7rem; border-radius: 14px; }
    .choose-btn { background: #fff; border: 1.5px solid #5a7a5a; color: #3a5a3a; padding: 0.5rem 1.5rem; border-radius: 30px; cursor: pointer; }
    .choose-btn:active { background: #4a6a4a; color: #fff; }
    .remove-btn { background: none; border: 1px solid #c8d8c0; color: #8a7a6a; border-radius: 20px; padding: 0.2rem 0.9rem; font-size: 0.75rem; cursor: pointer; }
    
    .cart-panel { margin-top: 1.8rem; background: #fff; border-radius: 24px; padding: 1.2rem; border: 1px solid #dce8dc; text-align: center; }
    .cart-item { background: #f7faf5; border-radius: 16px; padding: 0.7rem 0.9rem; margin: 0.4rem 0; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
    .total-box { margin-top: 1rem; font-size: 1.1rem; font-weight: 500; color: #3a5a3a; display: flex; justify-content: space-between; border-top: 1px solid #dce8dc; padding-top: 0.9rem; }
    
    .payment-section { margin-top: 1rem; padding: 1rem; background: #f7faf5; border-radius: 20px; border: 1px solid #dce8dc; }
    .payment-section h4 { color: #3a5a3a; margin-bottom: 0.8rem; }
    .input-row { display: flex; gap: 0.5rem; margin-bottom: 0.6rem; align-items: center; }
    .input-row label { font-size: 0.75rem; color: #5a7a5a; white-space: nowrap; }
    .input-row input { flex: 1; padding: 0.6rem 0.8rem; border: 1.5px solid #d4e2d4; border-radius: 20px; font-size: 0.85rem; outline: none; background: #fff; }
    .input-row input:focus { border-color: #5a7a5a; }
    
    .qr-center { text-align: center; margin: 0.8rem 0; }
    .qr-box { background: #fff; padding: 12px; border-radius: 16px; display: inline-block; border: 2px solid #4a6a4a; }
    .qr-label { font-size: 0.7rem; color: #8aa08a; margin-top: 0.3rem; }
    
    .big-btn {
      width: 100%; padding: 1rem; border-radius: 30px; border: none; font-size: 1rem;
      font-weight: 600; letter-spacing: 1px; cursor: pointer; margin-top: 0.6rem; transition: 0.2s;
    }
    .big-btn:active { transform: scale(0.97); }
    
    .btn-yellow { background: #FFDD2D; color: #000; }
    .btn-green { background: #2d3a2c; color: #fff; }
    .btn-white { background: #fff; border: 2px solid #4a6a4a; color: #3a5a3a; }
    
    .copy-btn { display: block; text-align: center; color: #4a6a4a; font-size: 0.8rem; margin-top: 0.6rem; cursor: pointer; text-decoration: underline; }
    
    .category-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
    .tab-btn { background: #fff; border: 1px solid #d4e2d4; color: #5a7a5a; padding: 0.4rem 1.1rem; border-radius: 20px; font-size: 0.8rem; cursor: pointer; }
    .tab-btn.active { background: #4a6a4a; color: #fff; }
    
    .password-popup { background: #fff; border-radius: 20px; padding: 1.5rem; border: 1px solid #c0d4c0; margin-bottom: 1rem; display: none; }
    .password-popup.open { display: block; }
    .password-popup input { width: 100%; padding: 0.6rem 1rem; border: 1.5px solid #d4e2d4; border-radius: 30px; font-size: 0.9rem; outline: none; margin-bottom: 0.6rem; }
    .pwd-actions { display: flex; gap: 0.6rem; justify-content: flex-end; }
    .pwd-actions button { background: #fff; border: 1.5px solid #5a7a5a; padding: 0.35rem 1.2rem; border-radius: 30px; cursor: pointer; }
    .pwd-actions button.primary { background: #4a6a4a; color: #fff; }
    
    .footer-note { font-size: 0.7rem; color: #a0b8a0; text-align: center; margin-top: 1.5rem; }
    .photo-upload-input { display: none; }
    .image-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; border-radius: 18px; color: #fff; cursor: pointer; }
    .product-image:hover .image-overlay { opacity: 1; }
    .image-overlay span { background: #2d3a2ccc; padding: 0.4rem 1.2rem; border-radius: 30px; }
    .lock-overlay { position: absolute; inset: 0; background: rgba(60,70,60,0.25); display: flex; align-items: center; justify-content: center; border-radius: 18px; color: #fff; font-size: 1.8rem; opacity: 0; pointer-events: none; z-index: 5; }
    .lock-overlay.show { opacity: 1; }
    .reset-photo-btn { position: absolute; bottom: 8px; right: 10px; background: #ffffffdd; border: 1px solid #b0c8b0; border-radius: 20px; padding: 0.15rem 0.7rem; font-size: 0.6rem; cursor: pointer; z-index: 6; }
    .admin-edit-input, .admin-edit-textarea { width: 100%; padding: 0.4rem 0.7rem; border: 1.5px dashed #5a7a5a; border-radius: 12px; font-size: 0.9rem; background: #fafff7; outline: none; font-family: inherit; }
    .admin-edit-textarea { resize: vertical; min-height: 50px; }
    .admin-edit-price { width: 100px; text-align: right; }
    .admin-edit-label { font-size: 0.7rem; color: #5a7a5a; }
    .save-indicator { display: inline-block; background: #4a6a4a; color: #fff; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.65rem; animation: fadeOut 2s forwards; }
    @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; } }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <h1>GULISTORY</h1>
    <div class="subtitle">сумки & платки</div>
  </div>

  <div class="admin-panel">
    <span>🔐 Админ</span>
    <button class="admin-toggle" id="adminToggle">Войти</button>
  </div>

  <div class="password-popup" id="passwordPopup">
    <label>Пароль:</label>
    <input type="password" id="pwdInput" placeholder="••••••••">
    <div class="pwd-actions">
      <button id="pwdCancel">Отмена</button>
      <button class="primary" id="pwdConfirm">Войти</button>
    </div>
  </div>

  <div class="category-tabs">
    <button class="tab-btn active" data-category="all">всё</button>
    <button class="tab-btn" data-category="bag">👜 сумки</button>
    <button class="tab-btn" data-category="scarf">🧣 платки</button>
  </div>

  <div id="catalog"></div>

  <div class="cart-panel">
    <h3>✧ корзина ✧</h3>
    <div id="cartContainer"><div style="color:#a0b0a0;padding:0.8rem;">пусто</div></div>
    <div class="total-box" id="totalBox" style="display:none;">
      <span>Итого</span>
      <span id="totalPrice">0 ₽</span>
    </div>

    <div class="payment-section" id="paymentSection" style="display:none;">
      <h4>💳 Оплата заказа</h4>
      <div class="input-row">
        <label>📱 Телефон:</label>
        <input type="tel" id="sellerPhone" value="89280048199">
      </div>
      <div class="input-row">
        <label>🏦 Банк:</label>
        <input type="text" id="sellerBank" value="Т-Банк (Тинькофф)">
      </div>
      
      <div class="qr-center">
        <div class="qr-box" id="qrBox"></div>
        <div class="qr-label">📷 Наведи камеру банка на QR — реквизиты считаются сами</div>
      </div>

      <button class="big-btn btn-yellow" id="btnCopyPhone">📋 Скопировать номер 89280048199</button>
      <button class="big-btn btn-green" id="btnCopyAll">📋 Скопировать все реквизиты</button>
      <button class="big-btn btn-white" id="btnOpenBank">🏦 Открыть Т-Банк</button>
    </div>
  </div>
  <div class="footer-note">gulistory — тихая роскошь</div>
</div>

<script>
  const ADMIN_PASSWORD = 'gulistory2026';
  const SELLER_PHONE = '89280048199';
  let isAdmin = false;
  let cart = [];
  let currentCategory = 'all';
  const photoMap = new Map();

  function loadEdits() { try { return JSON.parse(localStorage.getItem('gulistory_edits') || '{}'); } catch(e) { return {}; } }
  function saveEdits(e) { localStorage.setItem('gulistory_edits', JSON.stringify(e)); }
  let productEdits = loadEdits();

  const baseProducts = [
    { id: 1, category: 'bag', title: 'Сумка «Тишина»', price: 8900, material: 'натуральная кожа', desc: 'Мягкая сумка-тоут оливкового оттенка.', emoji: '👜', badge: 'хит' },
    { id: 2, category: 'bag', title: 'Сумка «Шалфей»', price: 12400, material: 'замша', desc: 'Кросс-боди цвета сухого шалфея.', emoji: '👝', badge: 'новинка' },
    { id: 3, category: 'scarf', title: 'Платок «Луговой»', price: 4200, material: 'шёлк 100%', desc: 'Нежный платок с принтом. 90×90 см.', emoji: '🧣', badge: '' },
    { id: 4, category: 'scarf', title: 'Платок «Мята»', price: 3800, material: 'хлопок/шёлк', desc: 'Лёгкий платок мятного оттенка.', emoji: '🧣', badge: '' },
    { id: 5, category: 'bag', title: 'Сумка «Роща»', price: 7600, material: 'экокожа', desc: 'Структурированная сумка зелёного цвета.', emoji: '👜', badge: '' },
    { id: 6, category: 'scarf', title: 'Платок «Ива»', price: 5100, material: 'кашемир', desc: 'Тёплый платок, серебристая полынь.', emoji: '🧣', badge: 'хит' }
  ];

  function getProducts() {
    return baseProducts.map(p => {
      const e = productEdits[p.id];
      return e ? { ...p, title: e.title || p.title, price: e.price || p.price, desc: e.desc || p.desc } : p;
    });
  }
  function getProductById(id) { return getProducts().find(p => p.id === id); }
  function getTotal() { return cart.reduce((s, id) => { const p = getProductById(id); return s + (p ? p.price : 0); }, 0); }

  // АДМИН
  document.getElementById('adminToggle').addEventListener('click', () => {
    if (isAdmin) { isAdmin = false; document.getElementById('adminToggle').classList.remove('active'); document.getElementById('adminToggle').textContent = 'Войти'; renderCatalog(); }
    else document.getElementById('passwordPopup').classList.add('open');
  });
  document.getElementById('pwdCancel').addEventListener('click', () => document.getElementById('passwordPopup').classList.remove('open'));
  document.getElementById('pwdConfirm').addEventListener('click', () => {
    if (document.getElementById('pwdInput').value === ADMIN_PASSWORD) {
      isAdmin = true;
      document.getElementById('adminToggle').textContent = 'Выйти (админ)';
      document.getElementById('adminToggle').classList.add('active');
      document.getElementById('passwordPopup').classList.remove('open');
      renderCatalog();
    } else alert('Неверный пароль!');
  });

  function saveEdit(id, field, value) {
    if (!productEdits[id]) productEdits[id] = {};
    productEdits[id][field] = field === 'price' ? (parseFloat(value) || 0) : value;
    saveEdits(productEdits);
  }

  // КАТАЛОГ
  function renderCatalog() {
    const div = document.getElementById('catalog');
    div.innerHTML = '';
    const filtered = currentCategory === 'all' ? getProducts() : getProducts().filter(p => p.category === currentCategory);
    filtered.forEach(p => {
      const photo = photoMap.get(p.id);
      const bg = photo ? `background-image:url(${photo});background-size:cover;background-position:center;` : '';
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="product-image" style="${bg}">
          ${!photo ? `<span class="product-emoji">${p.emoji}</span>` : ''}
          ${p.badge ? `<span class="product-badge">${p.badge}</span>` : ''}
          ${isAdmin ? `<label class="image-overlay" for="ph-${p.id}"><span>📷 фото</span></label>` : ''}
          ${!isAdmin && photo ? '<div class="lock-overlay show">🔒</div>' : ''}
          ${isAdmin && photo ? `<button class="reset-photo-btn" data-id="${p.id}">✕</button>` : ''}
          ${isAdmin ? `<input type="file" accept="image/*" class="photo-upload-input" id="ph-${p.id}" data-id="${p.id}">` : ''}
        </div>
        <div class="product-title">
          ${isAdmin ? `<input class="admin-edit-input" value="${p.title}" data-field="title" data-id="${p.id}">` : `<span>${p.title}</span>`}
          ${isAdmin ? `<input class="admin-edit-input admin-edit-price" type="number" value="${p.price}" data-field="price" data-id="${p.id}">` : `<span class="price">${p.price.toLocaleString()} ₽</span>`}
        </div>
        ${isAdmin ? `<textarea class="admin-edit-textarea" data-field="desc" data-id="${p.id}">${p.desc}</textarea>` : `<div class="description">${p.desc}</div>`}
        <div class="details-row">
          <span class="material-tag">${p.material}</span>
          <button class="choose-btn" data-id="${p.id}">В корзину</button>
        </div>
      `;
      div.appendChild(card);

      if (isAdmin) {
        card.querySelectorAll('[data-field]').forEach(inp => inp.addEventListener('input', function() {
          saveEdit(+this.dataset.id, this.dataset.field, this.value);
          const s = document.createElement('span'); s.className = 'save-indicator'; s.textContent = '✓';
          this.parentElement.appendChild(s); setTimeout(() => s.remove(), 2000);
        }));
        const fi = card.querySelector(`#ph-${p.id}`);
        if (fi) fi.addEventListener('change', function(e) {
          const f = this.files[0]; if (!f) return;
          const r = new FileReader();
          r.onload = ev => { photoMap.set(p.id, ev.target.result); renderCatalog(); };
          r.readAsDataURL(f);
        });
        const rb = card.querySelector('.reset-photo-btn');
        if (rb) rb.addEventListener('click', () => { photoMap.delete(p.id); renderCatalog(); });
      }
      card.querySelector('.choose-btn').addEventListener('click', () => { if (!cart.includes(p.id)) { cart.push(p.id); renderCart(); } });
    });
  }

  // КОРЗИНА
  function renderCart() {
    const cont = document.getElementById('cartContainer');
    const tb = document.getElementById('totalBox');
    const ps = document.getElementById('paymentSection');
    if (cart.length === 0) {
      cont.innerHTML = '<div style="color:#a0b0a0;padding:0.8rem;">пусто</div>';
      tb.style.display = 'none'; ps.style.display = 'none'; return;
    }
    tb.style.display = 'flex'; ps.style.display = 'block';
    document.getElementById('totalPrice').textContent = getTotal().toLocaleString() + ' ₽';
    cont.innerHTML = cart.map(id => {
      const p = getProductById(id);
      return p ? `<div class="cart-item"><span>${p.emoji} ${p.title}</span><span>${p.price.toLocaleString()} ₽ <button class="remove-btn" data-id="${p.id}">убрать</button></span></div>` : '';
    }).join('');
    document.querySelectorAll('.remove-btn').forEach(b => b.addEventListener('click', () => { cart = cart.filter(i => i !== +b.dataset.id); renderCart(); }));
    generateQR();
  }

  // ====== QR-КОД С НОМЕРОМ 89280048199 ======
  function generateQR() {
    const box = document.getElementById('qrBox');
    box.innerHTML = '';
    const phone = SELLER_PHONE;
    const bank = document.getElementById('sellerBank').value.trim();
    const total = getTotal();
    if (total <= 0) return;

    const qrText = `ST00012|Name=GULISTORY|PersonalAcc=${phone}|BankName=${bank}|Sum=${total * 100}|Purpose=Оплата заказа GULISTORY`;
    
    new QRCode(box, {
      text: qrText,
      width: 160,
      height: 160,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  }

  // ====== КНОПКИ ======
  document.getElementById('btnCopyPhone').addEventListener('click', () => {
    navigator.clipboard.writeText(SELLER_PHONE).then(() => alert('✅ Номер ' + SELLER_PHONE + ' скопирован!\n\nОткрой Т-Банк → Перевод по номеру телефона → Вставь номер.'));
  });

  document.getElementById('btnCopyAll').addEventListener('click', () => {
    const bank = document.getElementById('sellerBank').value;
    const total = getTotal();
    const text = `Получатель: GULISTORY\nТелефон: ${SELLER_PHONE}\nБанк: ${bank}\nСумма: ${total} ₽`;
    navigator.clipboard.writeText(text).then(() => alert('✅ Всё скопировано!\n\n' + text + '\n\nОткрой приложение банка и вставь.'));
  });

  document.getElementById('btnOpenBank').addEventListener('click', () => {
    const total = getTotal();
    const tbankUrl = `https://www.tbank.ru/payments/form/?to=${SELLER_PHONE}&sum=${total}&message=GULISTORY`;
    window.open(tbankUrl, '_blank');
  });

  document.getElementById('sellerPhone').addEventListener('input', generateQR);
  document.getElementById('sellerBank').addEventListener('input', generateQR);

  // ФИЛЬТРЫ
  document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', function() {
    document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
    this.classList.add('active');
    currentCategory = this.dataset.category;
    renderCatalog();
  }));

  renderCatalog();
  renderCart();
</script>
</body>
</html>
