<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>GULISTORY</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f4f7f2;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 1rem;
      color: #2d3a2c;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .app-container { max-width: 480px; width: 100%; }
    .header { text-align: center; margin-bottom: 1rem; padding-top: 1rem; }
    .header h1 { font-size: 2rem; font-weight: 400; letter-spacing: 5px; color: #3a5a3a; text-transform: uppercase; font-family: 'Times New Roman', Georgia, serif; }
    .header .subtitle { font-size: 0.8rem; color: #6b8b6b; letter-spacing: 3px; border-top: 1px solid #c8dac8; padding-top: 0.3rem; display: inline-block; }

    .admin-panel { background: #eaf1e8; border-radius: 15px; padding: 0.7rem; margin-bottom: 1rem; border: 1px solid #c0d4c0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.4rem; }
    .admin-toggle { background: #fff; border: 1.5px solid #5a7a5a; color: #3a5a3a; padding: 0.3rem 0.8rem; border-radius: 20px; cursor: pointer; font-size: 0.75rem; }
    .admin-toggle.active { background: #4a6a4a; color: #fff; }
    .admin-hint { font-size: 0.65rem; color: #6b8b6b; }

    .password-popup { background: #fff; border-radius: 15px; padding: 1rem; border: 1px solid #c0d4c0; margin-bottom: 1rem; display: none; }
    .password-popup.open { display: block; }
    .password-popup input { width: 100%; padding: 0.5rem; border: 1.5px solid #d4e2d4; border-radius: 20px; font-size: 0.9rem; outline: none; margin-bottom: 0.5rem; }
    .pwd-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
    .pwd-actions button { background: #fff; border: 1.5px solid #5a7a5a; padding: 0.3rem 0.8rem; border-radius: 20px; cursor: pointer; font-size: 0.75rem; }
    .pwd-actions button.primary { background: #4a6a4a; color: #fff; }

    .server-section { background: #f0f4ff; border-radius: 12px; padding: 0.7rem; margin-bottom: 0.8rem; border: 1px solid #5a7a5a; }
    .server-section h4 { font-size: 0.75rem; color: #3a5a3a; margin-bottom: 0.4rem; text-align: center; }
    .server-config input { width: 100%; padding: 0.4rem; border: 1px solid #d4d4d4; border-radius: 8px; font-size: 0.7rem; margin-top: 0.2rem; outline: none; }
    .server-btn-row { display: flex; gap: 0.3rem; margin-top: 0.3rem; }
    .server-btn-row button { flex: 1; padding: 0.3rem; border: none; border-radius: 12px; font-size: 0.65rem; cursor: pointer; font-weight: 500; }
    .btn-sync { background: #4a6a4a; color: #fff; }
    .btn-load { background: #2196F3; color: #fff; }
    .btn-sync:active, .btn-load:active { opacity: 0.8; }
    #syncStatus { font-size: 0.65rem; color: #888; margin-top: 0.3rem; text-align: center; }

    .card { background: #fff; border: 1px solid #dce8dc; border-radius: 18px; padding: 0.7rem; margin-bottom: 0.8rem; box-shadow: 0 4px 15px rgba(60,80,60,0.04); }
    .product-image { width: 100%; height: 180px; background-size: cover; background-position: center; border-radius: 12px; margin-bottom: 0.5rem; display: flex; align-items: center; justify-content: center; font-size: 3rem; background-color: #eaf2e8; position: relative; overflow: hidden; }
    .product-emoji { z-index: 2; pointer-events: none; }
    .product-title { font-size: 1rem; font-weight: 500; display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.2rem; flex-wrap: wrap; gap: 0.3rem; }
    .price { font-size: 0.9rem; font-weight: 500; color: #3a5a3a; background: #edf5ed; padding: 0.1rem 0.5rem; border-radius: 20px; }
    .description { color: #6b7d6b; font-size: 0.75rem; margin: 0.3rem 0 0.4rem; padding-left: 0.5rem; border-left: 2px solid #b4ccb4; }
    .details-row { display: flex; justify-content: space-between; align-items: center; gap: 0.3rem; }
    .choose-btn { background: #fff; border: 1.5px solid #5a7a5a; color: #3a5a3a; padding: 0.3rem 0.8rem; border-radius: 20px; cursor: pointer; font-size: 0.75rem; font-weight: 500; }
    .choose-btn:active { background: #4a6a4a; color: #fff; }
    .remove-btn { background: none; border: 1px solid #c8d8c0; color: #8a7a6a; border-radius: 15px; padding: 0.15rem 0.5rem; font-size: 0.6rem; cursor: pointer; }
    .delete-product-btn { background: #ff5252; color: #fff; border: none; padding: 0.25rem 0.6rem; border-radius: 12px; font-size: 0.65rem; cursor: pointer; }

    .photo-upload-input { display: none; }
    .image-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; border-radius: 12px; color: #fff; cursor: pointer; }
    .product-image:hover .image-overlay { opacity: 1; }
    .image-overlay span { background: #2d3a2ccc; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.7rem; }
    .reset-photo-btn { position: absolute; bottom: 5px; right: 8px; background: #ffffffdd; border: 1px solid #b0c8b0; border-radius: 12px; padding: 0.1rem 0.4rem; font-size: 0.5rem; cursor: pointer; z-index: 6; }

    .admin-edit-input, .admin-edit-textarea { width: 100%; padding: 0.25rem 0.4rem; border: 1.5px dashed #5a7a5a; border-radius: 8px; font-size: 0.75rem; background: #fafff7; outline: none; }
    .admin-edit-textarea { resize: vertical; min-height: 30px; }
    .admin-edit-price { width: 70px; text-align: right; }

    .add-product-section { background: #eaf1e8; border-radius: 12px; padding: 0.6rem; margin-bottom: 0.8rem; border: 2px dashed #5a7a5a; text-align: center; }
    .add-product-btn { background: #4a6a4a; color: #fff; border: none; padding: 0.4rem 1.2rem; border-radius: 20px; font-size: 0.8rem; cursor: pointer; }

    .cart-panel { margin-top: 0.8rem; background: #fff; border-radius: 18px; padding: 0.8rem; border: 1px solid #dce8dc; text-align: center; }
    .cart-panel h3 { font-size: 0.8rem; color: #5a7a5a; margin-bottom: 0.3rem; }
    .cart-item { background: #f7faf5; border-radius: 10px; padding: 0.4rem 0.5rem; margin: 0.15rem 0; display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; }
    .total-box { margin-top: 0.5rem; font-size: 0.9rem; font-weight: 500; color: #3a5a3a; display: flex; justify-content: space-between; border-top: 1px solid #dce8dc; padding-top: 0.5rem; }

    .pay-box { margin-top: 0.6rem; padding: 0.8rem; background: #fffbe6; border-radius: 12px; border: 2px solid #FFDD2D; text-align: center; }
    .pay-box .pay-phone { font-size: 1.3rem; font-weight: 700; color: #000; background: #fff; padding: 0.2rem 0.6rem; border-radius: 10px; display: inline-block; border: 2px dashed #4a6a4a; }
    .pay-box .pay-sum { font-size: 1rem; font-weight: 600; color: #4a6a4a; margin: 0.3rem 0; }

    .delivery-options { display: flex; gap: 0.3rem; margin: 0.3rem 0; }
    .delivery-option { flex: 1; padding: 0.4rem; border: 2px solid #d4e2d4; border-radius: 10px; cursor: pointer; font-size: 0.7rem; }
    .delivery-option.active { border-color: #4a6a4a; background: #e8f5e9; }
    .delivery-option input { display: none; }

    .order-form { text-align: left; margin: 0.4rem 0; }
    .order-form label { font-size: 0.7rem; color: #5a7a5a; display: block; margin: 0.2rem 0 0.1rem; }
    .order-form input, .order-form textarea { width: 100%; padding: 0.4rem; border: 1.5px solid #d4e2d4; border-radius: 10px; font-size: 0.75rem; outline: none; }
    .order-form textarea { resize: vertical; min-height: 35px; }

    .copy-btn { width: 100%; padding: 0.6rem; border-radius: 20px; border: none; font-size: 0.9rem; font-weight: 700; cursor: pointer; margin-top: 0.3rem; }
    .copy-btn:active { transform: scale(0.96); }
    .btn-num { background: #FFDD2D; color: #000; }
    .btn-sum { background: #2d3a2c; color: #fff; }
    .btn-order { background: #4CAF50; color: #fff; }

    .category-tabs { display: flex; gap: 0.3rem; margin-bottom: 0.6rem; }
    .tab-btn { background: #fff; border: 1px solid #d4e2d4; color: #5a7a5a; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.65rem; cursor: pointer; }
    .tab-btn.active { background: #4a6a4a; color: #fff; }

    .footer-note { font-size: 0.6rem; color: #a0b8a0; text-align: center; margin-top: 0.8rem; }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <h1>GULISTORY</h1>
    <div class="subtitle">сумки & платки</div>
  </div>

  <div class="admin-panel">
    <span style="font-size:0.75rem;">🔐 Админ</span>
    <div>
      <button class="admin-toggle" id="adminToggle">Войти</button>
      <span class="admin-hint" id="adminStatus">гость</span>
    </div>
  </div>

  <div class="password-popup" id="passwordPopup">
    <label>Пароль:</label>
    <input type="password" id="pwdInput" placeholder="••••••••">
    <div class="pwd-actions">
      <button id="pwdCancel">Отмена</button>
      <button class="primary" id="pwdConfirm">Войти</button>
    </div>
  </div>

  <div class="server-section" id="serverSection" style="display:none;">
    <h4>🖥 Синхронизация GitHub</h4>
    <input type="text" id="ghUser" placeholder="Имя пользователя GitHub">
    <input type="text" id="ghRepo" placeholder="Название репозитория">
    <input type="password" id="ghToken" placeholder="Токен GitHub">
    <div class="server-btn-row">
      <button class="btn-sync" id="btnSyncToGitHub">📤 Сохранить</button>
      <button class="btn-load" id="btnLoadFromGitHub">📥 Загрузить</button>
    </div>
    <div id="syncStatus"></div>
  </div>

  <div class="category-tabs">
    <button class="tab-btn active" data-category="all">всё</button>
    <button class="tab-btn" data-category="bag">👜 сумки</button>
    <button class="tab-btn" data-category="scarf">🧣 платки</button>
  </div>

  <div class="add-product-section" id="addProductSection" style="display:none;">
    <button class="add-product-btn" id="addProductBtn">➕ Добавить товар</button>
  </div>

  <div id="catalog"></div>

  <div class="cart-panel">
    <h3>✧ корзина ✧</h3>
    <div id="cartContainer"><div style="color:#a0b0a0;padding:0.5rem;">пусто</div></div>
    <div class="total-box" id="totalBox" style="display:none;">
      <span>Итого</span>
      <span id="totalPrice">0 ₽</span>
    </div>

    <div class="pay-box" id="payBox" style="display:none;">
      <div style="font-weight:600;color:#3a5a3a;">📦 Оформление</div>
      <div class="delivery-options">
        <label class="delivery-option active" id="optDelivery"><input type="radio" name="delivery" value="delivery" checked> 🚚 Доставка</label>
        <label class="delivery-option" id="optPickup"><input type="radio" name="delivery" value="pickup"> 🏠 Самовывоз</label>
      </div>
      <div class="order-form" id="deliveryForm">
        <label>👤 Имя:</label><input type="text" id="customerName" placeholder="Иван">
        <label>📱 Телефон:</label><input type="tel" id="customerPhone" placeholder="+79001234567">
        <label>📍 Адрес:</label><textarea id="customerAddress" placeholder="Город, улица"></textarea>
      </div>
      <div style="font-weight:600;color:#3a5a3a;margin-top:0.5rem;">💳 Номер для перевода:</div>
      <div class="pay-phone">89280048199</div>
      <div class="pay-sum">Сумма: <span id="paySum">0 ₽</span></div>
      <button class="copy-btn btn-num" id="copyPhone">📋 Скопировать номер</button>
      <button class="copy-btn btn-sum" id="copyAll">📋 Номер + сумма</button>
      <button class="copy-btn btn-order" id="confirmOrder">✅ Оформить заказ</button>
    </div>
  </div>

  <div class="footer-note">gulistory — тихая роскошь</div>
</div>

<script>
  const ADMIN_PASSWORD = 'gulistory2026';
  const SELLER_PHONE = '89280048199';
  
  let isAdmin = false;
  let cart = [];
  let currentCategory = 'all';
  let deliveryMethod = 'delivery';
  const photoMap = new Map();
  let productIdCounter = 100;

  function loadEdits() { try { return JSON.parse(localStorage.getItem('gulistory_edits') || '{}'); } catch(e) { return {}; } }
  function saveEdits(e) { localStorage.setItem('gulistory_edits', JSON.stringify(e)); }
  function loadCart() { try { return JSON.parse(localStorage.getItem('gulistory_cart') || '[]'); } catch(e) { return []; } }
  function saveCart() { localStorage.setItem('gulistory_cart', JSON.stringify(cart)); }
  function loadPhotos() {
    try { const s = localStorage.getItem('gulistory_photos'); if (s) { const o = JSON.parse(s); Object.keys(o).forEach(k => photoMap.set(+k, o[k])); } } catch(e) {}
  }
  function savePhotos() {
    const o = {}; photoMap.forEach((v, k) => o[k] = v);
    try { localStorage.setItem('gulistory_photos', JSON.stringify(o)); } catch(e) {}
  }
  function loadProducts() {
    try { const s = localStorage.getItem('gulistory_products'); if (s) return JSON.parse(s); } catch(e) {}
    return null;
  }
  function saveProducts(p) { localStorage.setItem('gulistory_products', JSON.stringify(p)); }

  let productEdits = loadEdits();
  cart = loadCart();
  loadPhotos();

  let baseProducts = loadProducts() || [
    { id: 1, category: 'bag', title: 'Сумка «Тишина»', price: 8900, desc: 'Мягкая сумка-тоут оливкового оттенка.', emoji: '👜' },
    { id: 2, category: 'bag', title: 'Сумка «Шалфей»', price: 12400, desc: 'Кросс-боди цвета сухого шалфея.', emoji: '👝' },
    { id: 3, category: 'scarf', title: 'Платок «Луговой»', price: 4200, desc: 'Нежный платок с принтом. 90×90 см.', emoji: '🧣' },
    { id: 4, category: 'scarf', title: 'Платок «Мята»', price: 3800, desc: 'Лёгкий платок мятного оттенка.', emoji: '🧣' },
    { id: 5, category: 'bag', title: 'Сумка «Роща»', price: 7600, desc: 'Структурированная сумка зелёного цвета.', emoji: '👜' },
    { id: 6, category: 'scarf', title: 'Платок «Ива»', price: 5100, desc: 'Тёплый платок, серебристая полынь.', emoji: '🧣' }
  ];
  baseProducts.forEach(p => { if (p.id >= productIdCounter) productIdCounter = p.id + 1; });

  function getProducts() {
    return baseProducts.map(p => {
      const e = productEdits[p.id];
      return e ? { ...p, title: e.title || p.title, price: e.price || p.price, desc: e.desc || p.desc } : p;
    });
  }
  function getProductById(id) { return getProducts().find(p => p.id === id); }
  function getTotal() { return cart.reduce((s, id) => { const p = getProductById(id); return s + (p ? p.price : 0); }, 0); }

  // ====== GITHUB ======
  function getGH() {
    return {
      user: document.getElementById('ghUser').value.trim(),
      repo: document.getElementById('ghRepo').value.trim(),
      token: document.getElementById('ghToken').value.trim()
    };
  }
  function saveGH(c) { localStorage.setItem('gh_config', JSON.stringify(c)); }
  function loadGH() { try { return JSON.parse(localStorage.getItem('gh_config') || '{}'); } catch(e) { return {}; } }

  (function() {
    const c = loadGH();
    if (c.user) document.getElementById('ghUser').value = c.user;
    if (c.repo) document.getElementById('ghRepo').value = c.repo;
    if (c.token) document.getElementById('ghToken').value = c.token;
  })();

  async function syncToGH() {
    const c = getGH();
    if (!c.user || !c.repo || !c.token) { document.getElementById('syncStatus').textContent = '❌ Заполни все поля!'; return; }
    saveGH(c);
    document.getElementById('syncStatus').textContent = '⏳ Сохраняю...';

    const data = { products: baseProducts, edits: productEdits, photos: Object.fromEntries(photoMap) };
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
    const url = `https://api.github.com/repos/${c.user}/${c.repo}/contents/data.json`;
    
    let sha = '';
    try { const r = await fetch(url, { headers: { Authorization: `token ${c.token}` } }); if (r.ok) { const d = await r.json(); sha = d.sha; } } catch(e) {}

    try {
      const body = { message: 'update', content: content };
      if (sha) body.sha = sha;
      const r = await fetch(url, { method: 'PUT', headers: { Authorization: `token ${c.token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      document.getElementById('syncStatus').textContent = r.ok ? '✅ Сохранено!' : '❌ Ошибка';
    } catch(e) { document.getElementById('syncStatus').textContent = '❌ Нет связи'; }
  }

  async function loadFromGH() {
    const c = getGH();
    if (!c.user || !c.repo) { document.getElementById('syncStatus').textContent = '❌ Введи пользователя и репо!'; return; }
    saveGH(c);
    document.getElementById('syncStatus').textContent = '⏳ Загружаю...';
    const url = `https://api.github.com/repos/${c.user}/${c.repo}/contents/data.json`;
    try {
      const r = await fetch(url, c.token ? { headers: { Authorization: `token ${c.token}` } } : {});
      if (r.ok) {
        const d = await r.json();
        const data = JSON.parse(decodeURIComponent(escape(atob(d.content))));
        if (data.products) { baseProducts = data.products; productIdCounter = Math.max(...baseProducts.map(p => p.id), 100) + 1; saveProducts(baseProducts); }
        if (data.edits) { productEdits = data.edits; saveEdits(productEdits); }
        if (data.photos) { photoMap.clear(); Object.keys(data.photos).forEach(k => photoMap.set(+k, data.photos[k])); savePhotos(); }
        renderCatalog();
        document.getElementById('syncStatus').textContent = '✅ Загружено!';
      } else if (r.status === 404) { document.getElementById('syncStatus').textContent = '⚠️ Файл не найден'; }
      else { document.getElementById('syncStatus').textContent = '❌ Ошибка'; }
    } catch(e) { document.getElementById('syncStatus').textContent = '❌ Нет связи'; }
  }

  document.getElementById('btnSyncToGitHub').addEventListener('click', syncToGH);
  document.getElementById('btnLoadFromGitHub').addEventListener('click', loadFromGH);

  // ====== АДМИН ======
  document.getElementById('adminToggle').addEventListener('click', () => {
    if (isAdmin) { 
      isAdmin = false; 
      document.getElementById('adminToggle').classList.remove('active'); 
      document.getElementById('adminToggle').textContent = 'Войти'; 
      document.getElementById('adminStatus').textContent = 'гость';
      document.getElementById('addProductSection').style.display = 'none';
      document.getElementById('serverSection').style.display = 'none';
      renderCatalog(); 
    } else { document.getElementById('passwordPopup').classList.add('open'); }
  });
  document.getElementById('pwdCancel').addEventListener('click', () => document.getElementById('passwordPopup').classList.remove('open'));
  document.getElementById('pwdConfirm').addEventListener('click', () => {
    if (document.getElementById('pwdInput').value === ADMIN_PASSWORD) {
      isAdmin = true;
      document.getElementById('adminToggle').textContent = 'Выйти (админ)';
      document.getElementById('adminToggle').classList.add('active');
      document.getElementById('adminStatus').textContent = 'админ';
      document.getElementById('passwordPopup').classList.remove('open');
      document.getElementById('pwdInput').value = '';
      document.getElementById('addProductSection').style.display = 'block';
      document.getElementById('serverSection').style.display = 'block';
      renderCatalog();
    } else { alert('Неверный пароль!'); }
  });

  function addNewProduct() {
    const t = prompt('Название:');
    if (!t) return;
    const p = parseFloat(prompt('Цена:'));
    if (isNaN(p) || p <= 0) return;
    const d = prompt('Описание:') || '';
    const c = prompt('Категория (bag/scarf):') || 'bag';
    baseProducts.push({ id: productIdCounter++, category: c === 'scarf' ? 'scarf' : 'bag', title: t, price: p, desc: d, emoji: c === 'scarf' ? '🧣' : '👜' });
    saveProducts(baseProducts);
    renderCatalog();
  }

  function deleteProduct(id) {
    if (!confirm('Удалить?')) return;
    baseProducts = baseProducts.filter(p => p.id !== id);
    photoMap.delete(id);
    delete productEdits[id];
    cart = cart.filter(i => i !== id);
    saveProducts(baseProducts); savePhotos(); saveEdits(productEdits); saveCart();
    renderCatalog(); renderCart();
  }

  document.getElementById('addProductBtn').addEventListener('click', addNewProduct);

  function saveEdit(id, field, value) {
    if (!productEdits[id]) productEdits[id] = {};
    productEdits[id][field] = field === 'price' ? (parseFloat(value) || 0) : value;
    saveEdits(productEdits);
  }

  // ====== КАТАЛОГ ======
  function renderCatalog() {
    const div = document.getElementById('catalog');
    div.innerHTML = '';
    const filtered = currentCategory === 'all' ? getProducts() : getProducts().filter(p => p.category === currentCategory);
    filtered.forEach(p => {
      const photo = photoMap.get(p.id);
      const bg = photo ? `background-image:url(${photo});background-size:cover;background-position:center;` : '';
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="product-image" style="${bg}">
          ${!photo ? `<span class="product-emoji">${p.emoji}</span>` : ''}
          ${isAdmin ? `<label class="image-overlay" for="ph-${p.id}"><span>📷</span></label>` : ''}
          ${isAdmin && photo ? `<button class="reset-photo-btn" data-id="${p.id}">✕</button>` : ''}
          ${isAdmin ? `<input type="file" accept="image/*" class="photo-upload-input" id="ph-${p.id}">` : ''}
        </div>
        <div class="product-title">
          ${isAdmin ? `<input class="admin-edit-input" value="${p.title.replace(/"/g,'&quot;')}" data-field="title" data-id="${p.id}">` : `<span>${p.title}</span>`}
          ${isAdmin ? `<input class="admin-edit-input admin-edit-price" type="number" value="${p.price}" data-field="price" data-id="${p.id}">` : `<span class="price">${p.price.toLocaleString()} ₽</span>`}
        </div>
        ${isAdmin ? `<textarea class="admin-edit-textarea" data-field="desc" data-id="${p.id}">${p.desc}</textarea>` : `<div class="description">${p.desc}</div>`}
        <div class="details-row">
          <button class="choose-btn" data-id="${p.id}">В корзину</button>
          ${isAdmin ? `<button class="delete-product-btn" data-id="${p.id}">🗑</button>` : ''}
        </div>
      `;
      div.appendChild(card);

      if (isAdmin) {
        card.querySelectorAll('[data-field]').forEach(inp => inp.addEventListener('input', function() {
          saveEdit(+this.dataset.id, this.dataset.field, this.value);
        }));
        const fi = card.querySelector(`#ph-${p.id}`);
        if (fi) fi.addEventListener('change', function(e) {
          const f = this.files[0]; if (!f) return;
          const r = new FileReader();
          r.onload = ev => { photoMap.set(p.id, ev.target.result); savePhotos(); renderCatalog(); };
          r.readAsDataURL(f);
        });
        const rb = card.querySelector('.reset-photo-btn');
        if (rb) rb.addEventListener('click', () => { photoMap.delete(p.id); savePhotos(); renderCatalog(); });
        card.querySelector('.delete-product-btn').addEventListener('click', () => deleteProduct(p.id));
      }
      card.querySelector('.choose-btn').addEventListener('click', () => { 
        if (!cart.includes(p.id)) { cart.push(p.id); saveCart(); renderCart(); } 
      });
    });
  }

  // ====== КОРЗИНА ======
  function renderCart() {
    const cont = document.getElementById('cartContainer');
    const tb = document.getElementById('totalBox');
    const pb = document.getElementById('payBox');
    if (cart.length === 0) { 
      cont.innerHTML = '<div style="color:#a0b0a0;">пусто</div>'; 
      tb.style.display = 'none'; pb.style.display = 'none'; return; 
    }
    tb.style.display = 'flex'; pb.style.display = 'block';
    const total = getTotal();
    document.getElementById('totalPrice').textContent = total.toLocaleString() + ' ₽';
    document.getElementById('paySum').textContent = total.toLocaleString() + ' ₽';
    cont.innerHTML = cart.map(id => {
      const p = getProductById(id);
      return p ? `<div class="cart-item"><span>${p.emoji} ${p.title}</span><span>${p.price.toLocaleString()} ₽ <button class="remove-btn" data-id="${p.id}">убрать</button></span></div>` : '';
    }).join('');
    document.querySelectorAll('.remove-btn').forEach(b => b.addEventListener('click', () => { 
      cart = cart.filter(i => i !== +b.dataset.id); saveCart(); renderCart(); 
    }));
  }

  // ====== ДОСТАВКА ======
  document.getElementById('optDelivery').addEventListener('click', () => {
    deliveryMethod = 'delivery';
    document.getElementById('optDelivery').classList.add('active');
    document.getElementById('optPickup').classList.remove('active');
    document.getElementById('deliveryForm').style.display = 'block';
  });
  document.getElementById('optPickup').addEventListener('click', () => {
    deliveryMethod = 'pickup';
    document.getElementById('optPickup').classList.add('active');
    document.getElementById('optDelivery').classList.remove('active');
    document.getElementById('deliveryForm').style.display = 'none';
  });

  // ====== КНОПКИ ======
  document.getElementById('copyPhone').addEventListener('click', () => navigator.clipboard.writeText(SELLER_PHONE).then(() => alert('✅ ' + SELLER_PHONE)));
  document.getElementById('copyAll').addEventListener('click', () => navigator.clipboard.writeText(SELLER_PHONE + ' ' + getTotal() + '₽').then(() => alert('✅ Скопировано!')));
  document.getElementById('confirmOrder').addEventListener('click', () => {
    const name = document.getElementById('customerName').value.trim();
    const phone = document.getElementById('customerPhone').value.trim();
    if (!name || !phone) { alert('Введи имя и телефон!'); return; }
    alert('✅ Заказ оформлен!\n\nИмя: ' + name + '\nТелефон: ' + phone + '\nСумма: ' + getTotal().toLocaleString() + ' ₽\n\nПереведи на номер ' + SELLER_PHONE);
    cart = []; saveCart(); renderCart();
    document.getElementById('customerName').value = '';
    document.getElementById('customerPhone').value = '';
    document.getElementById('customerAddress').value = '';
  });

  // ====== ФИЛЬТРЫ ======
  document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', function() {
    document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
    this.classList.add('active');
    currentCategory = this.dataset.category;
    renderCatalog();
  }));

  renderCatalog();
  renderCart();
</script>
</body>
</html>
