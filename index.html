<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>GULISTORY</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f4f7f2;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 1rem;
      color: #2d3a2c;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .app-container { max-width: 480px; width: 100%; }
    .header { text-align: center; margin-bottom: 1.5rem; padding-top: 1rem; }
    .header h1 { font-size: 2.2rem; font-weight: 400; letter-spacing: 5px; color: #3a5a3a; text-transform: uppercase; font-family: 'Times New Roman', Georgia, serif; }
    .header .subtitle { font-size: 0.85rem; color: #6b8b6b; letter-spacing: 3px; border-top: 1px solid #c8dac8; padding-top: 0.5rem; display: inline-block; }

    .admin-panel { background: #eaf1e8; border-radius: 20px; padding: 0.8rem 1rem; margin-bottom: 1.5rem; border: 1px solid #c0d4c0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.6rem; }
    .admin-toggle { background: #fff; border: 1.5px solid #5a7a5a; color: #3a5a3a; padding: 0.35rem 1rem; border-radius: 30px; cursor: pointer; font-size: 0.8rem; }
    .admin-toggle.active { background: #4a6a4a; color: #fff; }
    .admin-hint { font-size: 0.7rem; color: #6b8b6b; }

    .password-popup { background: #fff; border-radius: 20px; padding: 1.5rem; border: 1px solid #c0d4c0; margin-bottom: 1rem; display: none; }
    .password-popup.open { display: block; }
    .password-popup input { width: 100%; padding: 0.6rem 1rem; border: 1.5px solid #d4e2d4; border-radius: 30px; font-size: 0.9rem; outline: none; margin-bottom: 0.6rem; }
    .pwd-actions { display: flex; gap: 0.6rem; justify-content: flex-end; }
    .pwd-actions button { background: #fff; border: 1.5px solid #5a7a5a; padding: 0.35rem 1.2rem; border-radius: 30px; cursor: pointer; }
    .pwd-actions button.primary { background: #4a6a4a; color: #fff; }

    .card { background: #fff; border: 1px solid #dce8dc; border-radius: 24px; padding: 1rem; margin-bottom: 1.4rem; box-shadow: 0 8px 24px rgba(60,80,60,0.06); position: relative; }
    .product-image { width: 100%; height: 220px; background-size: cover; background-position: center; border-radius: 18px; margin-bottom: 0.9rem; display: flex; align-items: center; justify-content: center; font-size: 4rem; background-color: #eaf2e8; position: relative; overflow: hidden; }
    .product-emoji { z-index: 2; pointer-events: none; }
    .product-title { font-size: 1.2rem; font-weight: 500; display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.3rem; flex-wrap: wrap; gap: 0.5rem; }
    .price { font-size: 1.1rem; font-weight: 500; color: #3a5a3a; background: #edf5ed; padding: 0.2rem 0.8rem; border-radius: 30px; }
    .description { color: #6b7d6b; font-size: 0.85rem; margin: 0.5rem 0 0.8rem; padding-left: 0.8rem; border-left: 2px solid #b4ccb4; }
    .details-row { display: flex; justify-content: space-between; align-items: center; margin-top: 0.3rem; gap: 0.5rem; }
    .choose-btn { background: #fff; border: 1.5px solid #5a7a5a; color: #3a5a3a; padding: 0.5rem 1.5rem; border-radius: 30px; cursor: pointer; font-size: 0.9rem; font-weight: 500; }
    .choose-btn:active { background: #4a6a4a; color: #fff; }
    .remove-btn { background: none; border: 1px solid #c8d8c0; color: #8a7a6a; border-radius: 20px; padding: 0.2rem 0.7rem; font-size: 0.7rem; cursor: pointer; }
    .delete-product-btn { background: #ff5252; color: #fff; border: none; padding: 0.4rem 1rem; border-radius: 20px; font-size: 0.75rem; cursor: pointer; font-weight: 600; }
    .delete-product-btn:active { background: #d32f2f; }

    .photo-upload-input { display: none; }
    .image-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; border-radius: 18px; color: #fff; cursor: pointer; }
    .product-image:hover .image-overlay { opacity: 1; }
    .image-overlay span { background: #2d3a2ccc; padding: 0.3rem 1rem; border-radius: 30px; font-size: 0.8rem; }
    .reset-photo-btn { position: absolute; bottom: 8px; right: 10px; background: #ffffffdd; border: 1px solid #b0c8b0; border-radius: 20px; padding: 0.15rem 0.6rem; font-size: 0.6rem; cursor: pointer; z-index: 6; }

    .admin-edit-input, .admin-edit-textarea { width: 100%; padding: 0.35rem 0.6rem; border: 1.5px dashed #5a7a5a; border-radius: 12px; font-size: 0.85rem; background: #fafff7; outline: none; font-family: inherit; }
    .admin-edit-textarea { resize: vertical; min-height: 40px; }
    .admin-edit-price { width: 90px; text-align: right; }
    .save-indicator { display: inline-block; background: #4a6a4a; color: #fff; padding: 0.15rem 0.5rem; border-radius: 10px; font-size: 0.6rem; animation: fadeOut 2s forwards; }
    @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; } }

    .add-product-section { background: #eaf1e8; border-radius: 20px; padding: 1rem; margin-bottom: 1.5rem; border: 2px dashed #5a7a5a; text-align: center; }
    .add-product-btn { background: #4a6a4a; color: #fff; border: none; padding: 0.7rem 2rem; border-radius: 30px; font-size: 1rem; font-weight: 600; cursor: pointer; letter-spacing: 1px; }
    .add-product-btn:active { background: #3a5a3a; }

    .cart-panel { margin-top: 1.5rem; background: #fff; border-radius: 24px; padding: 1.2rem; border: 1px solid #dce8dc; text-align: center; }
    .cart-panel h3 { font-size: 0.9rem; letter-spacing: 2px; color: #5a7a5a; margin-bottom: 0.5rem; text-transform: uppercase; }
    .cart-item { background: #f7faf5; border-radius: 16px; padding: 0.6rem 0.8rem; margin: 0.3rem 0; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; }
    .total-box { margin-top: 0.8rem; font-size: 1.1rem; font-weight: 500; color: #3a5a3a; display: flex; justify-content: space-between; border-top: 1px solid #dce8dc; padding-top: 0.8rem; }

    .pay-box { margin-top: 1rem; padding: 1.2rem; background: #fffbe6; border-radius: 20px; border: 2px solid #FFDD2D; text-align: center; }
    .pay-box .pay-phone { font-size: 1.8rem; font-weight: 700; letter-spacing: 3px; color: #000; background: #fff; padding: 0.5rem 1rem; border-radius: 15px; display: inline-block; border: 2px dashed #4a6a4a; margin: 0.5rem 0; }
    .pay-box .pay-sum { font-size: 1.2rem; font-weight: 600; color: #4a6a4a; margin: 0.5rem 0; }
    .copy-btn { width: 100%; padding: 1rem; border-radius: 30px; border: none; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 0.6rem; transition: 0.2s; }
    .copy-btn:active { transform: scale(0.96); }
    .btn-num { background: #FFDD2D; color: #000; }
    .btn-sum { background: #2d3a2c; color: #fff; }

    .category-tabs { display: flex; gap: 0.4rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .tab-btn { background: #fff; border: 1px solid #d4e2d4; color: #5a7a5a; padding: 0.3rem 0.9rem; border-radius: 20px; font-size: 0.75rem; cursor: pointer; }
    .tab-btn.active { background: #4a6a4a; color: #fff; }
    .footer-note { font-size: 0.7rem; color: #a0b8a0; text-align: center; margin-top: 1rem; }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <h1>GULISTORY</h1>
    <div class="subtitle">сумки & платки</div>
  </div>

  <div class="admin-panel">
    <span>🔐 Админ</span>
    <button class="admin-toggle" id="adminToggle">Войти</button>
    <span class="admin-hint" id="adminStatus">гость</span>
  </div>

  <div class="password-popup" id="passwordPopup">
    <label>Пароль:</label>
    <input type="password" id="pwdInput" placeholder="••••••••">
    <div class="pwd-actions">
      <button id="pwdCancel">Отмена</button>
      <button class="primary" id="pwdConfirm">Войти</button>
    </div>
  </div>

  <div class="category-tabs">
    <button class="tab-btn active" data-category="all">всё</button>
    <button class="tab-btn" data-category="bag">👜 сумки</button>
    <button class="tab-btn" data-category="scarf">🧣 платки</button>
  </div>

  <div class="add-product-section" id="addProductSection" style="display:none;">
    <button class="add-product-btn" id="addProductBtn">➕ Добавить новый товар</button>
  </div>

  <div id="catalog"></div>

  <div class="cart-panel">
    <h3>✧ корзина ✧</h3>
    <div id="cartContainer"><div style="color:#a0b0a0;padding:0.5rem;">пусто</div></div>
    <div class="total-box" id="totalBox" style="display:none;">
      <span>Итого</span>
      <span id="totalPrice">0 ₽</span>
    </div>

    <div class="pay-box" id="payBox" style="display:none;">
      <div style="font-weight:600;color:#3a5a3a;margin-bottom:0.5rem;">💳 Номер для перевода:</div>
      <div class="pay-phone">89280048199</div>
      <div class="pay-sum">Сумма: <span id="paySum">0 ₽</span></div>
      <button class="copy-btn btn-num" id="copyPhone">📋 Скопировать номер</button>
      <button class="copy-btn btn-sum" id="copyAll">📋 Скопировать номер и сумму</button>
    </div>
  </div>
  <div class="footer-note">gulistory — тихая роскошь</div>
</div>

<script>
  const ADMIN_PASSWORD = 'gulistory2026';
  const SELLER_PHONE = '89280048199';
  
  let isAdmin = false;
  let cart = [];
  let currentCategory = 'all';
  const photoMap = new Map();
  let productIdCounter = 100;

  function loadEdits() { try { return JSON.parse(localStorage.getItem('gulistory_edits') || '{}'); } catch(e) { return {}; } }
  function saveEdits(e) { localStorage.setItem('gulistory_edits', JSON.stringify(e)); }
  function loadCart() { try { return JSON.parse(localStorage.getItem('gulistory_cart') || '[]'); } catch(e) { return []; } }
  function saveCart() { localStorage.setItem('gulistory_cart', JSON.stringify(cart)); }
  function loadPhotos() {
    try {
      const saved = localStorage.getItem('gulistory_photos');
      if (saved) { const obj = JSON.parse(saved); Object.keys(obj).forEach(key => photoMap.set(parseInt(key), obj[key])); }
    } catch(e) {}
  }
  function savePhotos() {
    const obj = {};
    photoMap.forEach((val, key) => obj[key] = val);
    try { localStorage.setItem('gulistory_photos', JSON.stringify(obj)); } catch(e) {}
  }
  function loadProducts() {
    try { const saved = localStorage.getItem('gulistory_products'); if (saved) return JSON.parse(saved); } catch(e) {}
    return null;
  }
  function saveProducts(prods) { localStorage.setItem('gulistory_products', JSON.stringify(prods)); }

  let productEdits = loadEdits();
  cart = loadCart();
  loadPhotos();

  let baseProducts = loadProducts() || [
    { id: 1, category: 'bag', title: 'Сумка «Тишина»', price: 8900, desc: 'Мягкая сумка-тоут спокойного оливкового оттенка.', emoji: '👜' },
    { id: 2, category: 'bag', title: 'Сумка «Шалфей»', price: 12400, desc: 'Элегантная кросс-боди сумка цвета сухого шалфея.', emoji: '👝' },
    { id: 3, category: 'scarf', title: 'Платок «Луговой»', price: 4200, desc: 'Нежный платок с растительным принтом. 90×90 см.', emoji: '🧣' },
    { id: 4, category: 'scarf', title: 'Платок «Мята»', price: 3800, desc: 'Лёгкий платок мятного оттенка.', emoji: '🧣' },
    { id: 5, category: 'bag', title: 'Сумка «Роща»', price: 7600, desc: 'Структурированная сумка глубокого зелёного цвета.', emoji: '👜' },
    { id: 6, category: 'scarf', title: 'Платок «Ива»', price: 5100, desc: 'Тёплый платок, серебристая полынь.', emoji: '🧣' }
  ];
  
  baseProducts.forEach(p => { if (p.id >= productIdCounter) productIdCounter = p.id + 1; });

  function getProducts() {
    return baseProducts.map(p => {
      const e = productEdits[p.id];
      return e ? { ...p, title: e.title || p.title, price: e.price || p.price, desc: e.desc || p.desc } : p;
    });
  }
  function getProductById(id) { return getProducts().find(p => p.id === id); }
  function getTotal() { return cart.reduce((s, id) => { const p = getProductById(id); return s + (p ? p.price : 0); }, 0); }

  function deleteProduct(id) {
    if (!confirm('Удалить этот товар навсегда?')) return;
    baseProducts = baseProducts.filter(p => p.id !== id);
    photoMap.delete(id);
    if (productEdits[id]) delete productEdits[id];
    cart = cart.filter(i => i !== id);
    saveProducts(baseProducts);
    savePhotos();
    saveEdits(productEdits);
    saveCart();
    renderCatalog();
    renderCart();
  }

  function addNewProduct() {
    const title = prompt('Название товара:');
    if (!title) return;
    const price = parseFloat(prompt('Цена (в рублях):'));
    if (isNaN(price) || price <= 0) { alert('Нужна нормальная цена!'); return; }
    const desc = prompt('Описание:') || '';
    const cat = prompt('Категория (bag или scarf):') || 'bag';
    
    baseProducts.push({
      id: productIdCounter++,
      category: cat === 'scarf' ? 'scarf' : 'bag',
      title: title,
      price: price,
      desc: desc,
      emoji: cat === 'scarf' ? '🧣' : '👜'
    });
    saveProducts(baseProducts);
    renderCatalog();
  }

  document.getElementById('adminToggle').addEventListener('click', () => {
    if (isAdmin) { 
      isAdmin = false; 
      document.getElementById('adminToggle').classList.remove('active'); 
      document.getElementById('adminToggle').textContent = 'Войти'; 
      document.getElementById('adminStatus').textContent = 'гость';
      document.getElementById('addProductSection').style.display = 'none';
      renderCatalog(); 
    } else {
      document.getElementById('passwordPopup').classList.add('open');
    }
  });
  document.getElementById('pwdCancel').addEventListener('click', () => document.getElementById('passwordPopup').classList.remove('open'));
  document.getElementById('pwdConfirm').addEventListener('click', () => {
    if (document.getElementById('pwdInput').value === ADMIN_PASSWORD) {
      isAdmin = true;
      document.getElementById('adminToggle').textContent = 'Выйти';
      document.getElementById('adminToggle').classList.add('active');
      document.getElementById('adminStatus').textContent = 'админ';
      document.getElementById('passwordPopup').classList.remove('open');
      document.getElementById('pwdInput').value = '';
      document.getElementById('addProductSection').style.display = 'block';
      renderCatalog();
    } else {
      alert('Неверный пароль!');
      document.getElementById('pwdInput').value = '';
    }
  });
  document.getElementById('addProductBtn').addEventListener('click', addNewProduct);

  function saveEdit(id, field, value) {
    if (!productEdits[id]) productEdits[id] = {};
    productEdits[id][field] = field === 'price' ? (parseFloat(value) || 0) : value;
    saveEdits(productEdits);
  }

  function renderCatalog() {
    const div = document.getElementById('catalog');
    div.innerHTML = '';
    const filtered = currentCategory === 'all' ? getProducts() : getProducts().filter(p => p.category === currentCategory);
    filtered.forEach(p => {
      const photo = photoMap.get(p.id);
      const bg = photo ? `background-image:url(${photo});background-size:cover;background-position:center;` : '';
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="product-image" style="${bg}">
          ${!photo ? `<span class="product-emoji">${p.emoji}</span>` : ''}
          ${isAdmin ? `<label class="image-overlay" for="ph-${p.id}"><span>📷 фото</span></label>` : ''}
          ${isAdmin && photo ? `<button class="reset-photo-btn" data-id="${p.id}">✕</button>` : ''}
          ${isAdmin ? `<input type="file" accept="image/*" class="photo-upload-input" id="ph-${p.id}" data-id="${p.id}">` : ''}
        </div>
        <div class="product-title">
          ${isAdmin ? `<input class="admin-edit-input" value="${p.title.replace(/"/g,'&quot;')}" data-field="title" data-id="${p.id}">` : `<span>${p.title}</span>`}
          ${isAdmin ? `<input class="admin-edit-input admin-edit-price" type="number" value="${p.price}" data-field="price" data-id="${p.id}">` : `<span class="price">${p.price.toLocaleString()} ₽</span>`}
        </div>
        ${isAdmin ? `<textarea class="admin-edit-textarea" data-field="desc" data-id="${p.id}">${p.desc.replace(/"/g,'&quot;')}</textarea>` : `<div class="description">${p.desc}</div>`}
        <div class="details-row">
          <button class="choose-btn" data-id="${p.id}">В корзину</button>
          ${isAdmin ? `<button class="delete-product-btn" data-id="${p.id}">🗑 Удалить</button>` : ''}
        </div>
      `;
      div.appendChild(card);
      if (isAdmin) {
        card.querySelectorAll('[data-field]').forEach(inp => inp.addEventListener('input', function() {
          saveEdit(+this.dataset.id, this.dataset.field, this.value);
          const s = document.createElement('span'); s.className = 'save-indicator'; s.textContent = '✓';
          this.parentElement.appendChild(s); setTimeout(() => s.remove(), 2000);
        }));
        const fi = card.querySelector(`#ph-${p.id}`);
        if (fi) fi.addEventListener('change', function(e) {
          const f = this.files[0]; if (!f) return;
          const r = new FileReader();
          r.onload = ev => { photoMap.set(p.id, ev.target.result); savePhotos(); renderCatalog(); };
          r.readAsDataURL(f);
        });
        const rb = card.querySelector('.reset-photo-btn');
        if (rb) rb.addEventListener('click', () => { photoMap.delete(p.id); savePhotos(); renderCatalog(); });
        card.querySelector('.delete-product-btn').addEventListener('click', () => deleteProduct(p.id));
      }
      card.querySelector('.choose-btn').addEventListener('click', () => { 
        if (!cart.includes(p.id)) { cart.push(p.id); saveCart(); renderCart(); } 
      });
    });
  }

  function renderCart() {
    const cont = document.getElementById('cartContainer');
    const tb = document.getElementById('totalBox');
    const pb = document.getElementById('payBox');
    if (cart.length === 0) { 
      cont.innerHTML = '<div style="color:#a0b0a0;padding:0.5rem;">пусто</div>'; 
      tb.style.display = 'none'; pb.style.display = 'none'; return; 
    }
    tb.style.display = 'flex'; pb.style.display = 'block';
    const total = getTotal();
    document.getElementById('totalPrice').textContent = total.toLocaleString() + ' ₽';
    document.getElementById('paySum').textContent = total.toLocaleString() + ' ₽';
    cont.innerHTML = cart.map(id => {
      const p = getProductById(id);
      return p ? `<div class="cart-item"><span>${p.emoji} ${p.title}</span><span>${p.price.toLocaleString()} ₽ <button class="remove-btn" data-id="${p.id}">убрать</button></span></div>` : '';
    }).join('');
    document.querySelectorAll('.remove-btn').forEach(b => b.addEventListener('click', () => { 
      cart = cart.filter(i => i !== +b.dataset.id); saveCart(); renderCart(); 
    }));
  }

  document.getElementById('copyPhone').addEventListener('click', () => {
    navigator.clipboard.writeText(SELLER_PHONE).then(() => alert('✅ Номер скопирован: ' + SELLER_PHONE));
  });
  document.getElementById('copyAll').addEventListener('click', () => {
    navigator.clipboard.writeText(SELLER_PHONE + ' — ' + getTotal().toLocaleString() + ' ₽').then(() => alert('✅ Скопировано!'));
  });

  document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', function() {
    document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
    this.classList.add('active');
    currentCategory = this.dataset.category;
    renderCatalog();
  }));

  renderCatalog();
  renderCart();
</script>
</body>
</html>
