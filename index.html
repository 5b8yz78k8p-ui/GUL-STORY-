<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>GULISTORY · админ-панель</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f4f7f2;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 1rem;
      color: #2d3a2c;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .app-container {
      max-width: 480px;
      width: 100%;
    }

    .header {
      text-align: center;
      margin-bottom: 1.8rem;
      padding: 1.2rem 0 0.8rem;
    }

    .header h1 {
      font-size: 2.2rem;
      font-weight: 400;
      letter-spacing: 5px;
      color: #3a5a3a;
      text-transform: uppercase;
      font-family: 'Times New Roman', Georgia, serif;
    }

    .header .subtitle {
      font-size: 0.85rem;
      color: #6b8b6b;
      letter-spacing: 3px;
      margin-top: 0.3rem;
      display: inline-block;
      border-top: 1px solid #c8dac8;
      padding-top: 0.5rem;
    }

    /* Панель администратора */
    .admin-panel {
      background: #eaf1e8;
      border-radius: 20px;
      padding: 0.8rem 1rem;
      margin-bottom: 1.5rem;
      border: 1px solid #c0d4c0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.6rem;
    }

    .admin-panel .admin-label {
      font-size: 0.8rem;
      font-weight: 500;
      color: #3a5a3a;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .admin-panel .admin-label .lock-icon {
      font-size: 1.1rem;
    }

    .admin-toggle {
      background: #ffffff;
      border: 1.5px solid #5a7a5a;
      color: #3a5a3a;
      padding: 0.35rem 1rem;
      border-radius: 30px;
      font-weight: 500;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.25s;
      letter-spacing: 0.5px;
    }

    .admin-toggle.active {
      background: #4a6a4a;
      color: #ffffff;
      border-color: #4a6a4a;
    }

    .admin-toggle:hover {
      background: #4a6a4a;
      color: #ffffff;
      border-color: #4a6a4a;
    }

    .admin-toggle.active:hover {
      background: #3a5a3a;
    }

    .admin-hint {
      font-size: 0.7rem;
      color: #6b8b6b;
      background: #ffffffcc;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      border: 1px solid #c8dac8;
    }

    /* Карточка товара */
    .card {
      background: #ffffff;
      border: 1px solid #dce8dc;
      border-radius: 24px;
      padding: 1rem;
      margin-bottom: 1.4rem;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 24px rgba(60, 80, 60, 0.06);
      transition: all 0.3s ease;
      position: relative;
    }

    .card:hover {
      box-shadow: 0 12px 32px rgba(60, 80, 60, 0.12);
      border-color: #b4ccb4;
    }

    .product-image {
      width: 100%;
      height: 220px;
      background-size: cover;
      background-position: center;
      border-radius: 18px;
      margin-bottom: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      background-color: #eaf2e8;
      border: 1px solid #d4e2d4;
      position: relative;
      overflow: hidden;
      transition: background 0.2s;
    }

    .product-image .image-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
      backdrop-filter: blur(2px);
      border-radius: 18px;
      color: #fff;
      font-size: 0.9rem;
      letter-spacing: 1px;
      font-weight: 300;
      cursor: pointer;
    }

    .product-image:hover .image-overlay {
      opacity: 1;
    }

    .product-image .image-overlay span {
      background: #2d3a2ccc;
      padding: 0.4rem 1.2rem;
      border-radius: 30px;
      border: 1px solid #ffffff88;
    }

    .product-emoji {
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.08));
      opacity: 0.9;
      z-index: 2;
      pointer-events: none;
    }

    .photo-upload-input {
      display: none;
    }

    .product-badge {
      position: absolute;
      top: 10px;
      right: 12px;
      background: #ffffffdd;
      backdrop-filter: blur(6px);
      padding: 0.25rem 0.8rem;
      border-radius: 20px;
      font-size: 0.7rem;
      letter-spacing: 1px;
      color: #4a6a4a;
      font-weight: 500;
      border: 1px solid #c0d4c0;
      z-index: 3;
    }

    .product-title {
      font-size: 1.25rem;
      font-weight: 500;
      color: #2d3a2c;
      letter-spacing: 0.5px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.2rem;
    }

    .price {
      font-size: 1.15rem;
      font-weight: 500;
      color: #3a5a3a;
      background: #edf5ed;
      padding: 0.25rem 0.9rem;
      border-radius: 30px;
      letter-spacing: 0.5px;
    }

    .description {
      color: #6b7d6b;
      font-size: 0.9rem;
      line-height: 1.5;
      margin: 0.5rem 0 1rem 0;
      padding-left: 0.8rem;
      border-left: 2px solid #b4ccb4;
    }

    .details-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.2rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .material-tag {
      color: #8aa08a;
      font-size: 0.8rem;
      letter-spacing: 0.5px;
      background: #f4f8f2;
      padding: 0.25rem 0.7rem;
      border-radius: 14px;
    }

    .choose-btn {
      background: #ffffff;
      border: 1.5px solid #5a7a5a;
      color: #3a5a3a;
      padding: 0.5rem 1.5rem;
      border-radius: 30px;
      font-weight: 500;
      font-size: 0.9rem;
      letter-spacing: 0.8px;
      cursor: pointer;
      transition: all 0.25s;
    }

    .choose-btn:hover {
      background: #4a6a4a;
      color: #ffffff;
      border-color: #4a6a4a;
    }

    /* Замок на фото для не-админа */
    .product-image .lock-overlay {
      position: absolute;
      inset: 0;
      background: rgba(60, 70, 60, 0.25);
      backdrop-filter: blur(1.5px);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 18px;
      color: #fff;
      font-size: 1.8rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 5;
    }

    .product-image .lock-overlay.show {
      opacity: 1;
    }

    .reset-photo-btn {
      position: absolute;
      bottom: 8px;
      right: 10px;
      background: #ffffffdd;
      border: 1px solid #b0c8b0;
      border-radius: 20px;
      padding: 0.15rem 0.7rem;
      font-size: 0.6rem;
      color: #4a5a4a;
      cursor: pointer;
      opacity: 0.7;
      transition: 0.2s;
      z-index: 6;
      backdrop-filter: blur(4px);
    }
    .reset-photo-btn:hover {
      opacity: 1;
      background: #fff;
    }

    /* ====== СТИЛИ ДЛЯ АДМИН-РЕДАКТИРОВАНИЯ ====== */
    .admin-edit-input {
      width: 100%;
      padding: 0.4rem 0.7rem;
      border: 1.5px dashed #5a7a5a;
      border-radius: 12px;
      font-size: 0.9rem;
      background: #fafff7;
      color: #2d3a2c;
      outline: none;
      font-family: inherit;
      transition: 0.2s;
    }
    .admin-edit-input:focus {
      border-color: #3a5a3a;
      background: #fff;
      border-style: solid;
    }
    .admin-edit-price {
      width: 100px;
      text-align: right;
    }
    .admin-edit-textarea {
      width: 100%;
      padding: 0.4rem 0.7rem;
      border: 1.5px dashed #5a7a5a;
      border-radius: 12px;
      font-size: 0.85rem;
      background: #fafff7;
      color: #2d3a2c;
      outline: none;
      font-family: inherit;
      resize: vertical;
      min-height: 50px;
      transition: 0.2s;
    }
    .admin-edit-textarea:focus {
      border-color: #3a5a3a;
      background: #fff;
      border-style: solid;
    }
    .admin-save-btn {
      background: #4a6a4a;
      color: #fff;
      border: none;
      padding: 0.3rem 1rem;
      border-radius: 20px;
      font-size: 0.75rem;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: 0.2s;
    }
    .admin-save-btn:hover {
      background: #3a5a3a;
    }
    .admin-edit-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.3rem;
      flex-wrap: wrap;
    }
    .admin-edit-label {
      font-size: 0.7rem;
      color: #5a7a5a;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* Корзина */
    .cart-panel {
      margin-top: 1.8rem;
      background: #ffffff;
      border-radius: 24px;
      padding: 1.2rem 1.2rem 1.4rem;
      border: 1px solid #dce8dc;
      text-align: center;
      box-shadow: 0 8px 24px rgba(60, 80, 60, 0.06);
    }

    .cart-panel h3 {
      font-weight: 400;
      letter-spacing: 2px;
      color: #5a7a5a;
      margin-bottom: 0.8rem;
      font-size: 0.9rem;
      text-transform: uppercase;
    }

    .cart-item {
      background: #f7faf5;
      border-radius: 16px;
      padding: 0.7rem 0.9rem;
      margin: 0.4rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #2d3a2c;
      font-size: 0.9rem;
    }

    .remove-btn {
      background: none;
      border: 1px solid #c8d8c0;
      color: #8a7a6a;
      border-radius: 20px;
      padding: 0.2rem 0.9rem;
      font-size: 0.75rem;
      cursor: pointer;
      transition: 0.2s;
      letter-spacing: 0.5px;
    }

    .remove-btn:hover {
      background: #e8efe4;
      color: #5a4a3a;
    }

    .empty-cart {
      color: #a0b0a0;
      font-style: italic;
      padding: 0.8rem;
      font-size: 0.9rem;
    }

    .total-box {
      margin-top: 1rem;
      font-size: 1.1rem;
      font-weight: 500;
      color: #3a5a3a;
      display: flex;
      justify-content: space-between;
      border-top: 1px solid #dce8dc;
      padding-top: 0.9rem;
    }

    .footer-note {
      font-size: 0.7rem;
      color: #a0b8a0;
      text-align: center;
      margin-top: 1.5rem;
      letter-spacing: 1.5px;
    }

    .category-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
    }

    .tab-btn {
      background: #ffffff;
      border: 1px solid #d4e2d4;
      color: #5a7a5a;
      padding: 0.4rem 1.1rem;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: 0.2s;
    }

    .tab-btn.active {
      background: #4a6a4a;
      color: #ffffff;
      border-color: #4a6a4a;
    }

    /* Стиль для пароля */
    .password-popup {
      background: #ffffff;
      border-radius: 20px;
      padding: 1.5rem 1.2rem;
      border: 1px solid #c0d4c0;
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
      margin-bottom: 1rem;
      display: none;
    }

    .password-popup.open {
      display: block;
    }

    .password-popup label {
      font-size: 0.85rem;
      color: #3a5a3a;
      display: block;
      margin-bottom: 0.4rem;
    }

    .password-popup input {
      width: 100%;
      padding: 0.6rem 1rem;
      border: 1.5px solid #d4e2d4;
      border-radius: 30px;
      font-size: 0.9rem;
      outline: none;
      margin-bottom: 0.6rem;
    }

    .password-popup input:focus {
      border-color: #5a7a5a;
    }

    .password-popup .pwd-actions {
      display: flex;
      gap: 0.6rem;
      justify-content: flex-end;
    }

    .password-popup .pwd-actions button {
      background: #ffffff;
      border: 1.5px solid #5a7a5a;
      padding: 0.35rem 1.2rem;
      border-radius: 30px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.8rem;
    }

    .password-popup .pwd-actions button:hover {
      background: #4a6a4a;
      color: #fff;
      border-color: #4a6a4a;
    }

    .password-popup .pwd-actions button.primary {
      background: #4a6a4a;
      color: #fff;
    }

    .password-popup .pwd-actions button.primary:hover {
      background: #3a5a3a;
    }

    .password-popup .error-msg {
      color: #b55a5a;
      font-size: 0.75rem;
      margin-top: 0.2rem;
      display: none;
    }

    .password-popup .error-msg.show {
      display: block;
    }

    .save-indicator {
      display: inline-block;
      background: #4a6a4a;
      color: #fff;
      padding: 0.2rem 0.6rem;
      border-radius: 12px;
      font-size: 0.65rem;
      letter-spacing: 0.5px;
      animation: fadeOut 2s forwards;
    }
    @keyframes fadeOut {
      0% { opacity: 1; }
      70% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <h1>GULISTORY</h1>
    <div class="subtitle">сумки & платки</div>
  </div>

  <!-- Панель администратора -->
  <div class="admin-panel">
    <div class="admin-label">
      <span class="lock-icon">🔐</span> Режим администратора
    </div>
    <div>
      <button class="admin-toggle" id="adminToggle">Войти</button>
      <span class="admin-hint" id="adminStatus">⚪ гость</span>
    </div>
  </div>

  <!-- POPUP для пароля -->
  <div class="password-popup" id="passwordPopup">
    <label for="pwdInput">Введите пароль администратора</label>
    <input type="password" id="pwdInput" placeholder="••••••••" autocomplete="off">
    <div class="error-msg" id="pwdError">Неверный пароль</div>
    <div class="pwd-actions">
      <button id="pwdCancel">Отмена</button>
      <button class="primary" id="pwdConfirm">Войти</button>
    </div>
  </div>

  <!-- Фильтр -->
  <div class="category-tabs">
    <button class="tab-btn active" data-category="all">всё</button>
    <button class="tab-btn" data-category="bag">👜 сумки</button>
    <button class="tab-btn" data-category="scarf">🧣 платки</button>
  </div>

  <!-- Каталог -->
  <div id="catalog"></div>

  <!-- Корзина -->
  <div class="cart-panel" id="cartPanel">
    <h3>✧ моя корзина ✧</h3>
    <div id="cartContainer">
      <div class="empty-cart">Вы пока ничего не выбрали</div>
    </div>
    <div class="total-box" id="totalBox" style="display: none;">
      <span>Итого</span>
      <span id="totalPrice">0 ₽</span>
    </div>
  </div>
  <div class="footer-note">gulistory -- тихая роскошь</div>
</div>

<script>
  // ---------- КОНФИГ ----------
  const ADMIN_PASSWORD = 'gulistory2026';

  // ---------- СОСТОЯНИЕ ----------
  let isAdmin = false;
  let cart = [];
  let currentCategory = 'all';
  const photoMap = new Map();

  // Загружаем сохранённые правки товаров
  function loadProductEdits() {
    try {
      const saved = localStorage.getItem('gulistory_product_edits');
      return saved ? JSON.parse(saved) : {};
    } catch(e) {
      return {};
    }
  }

  function saveProductEdits(edits) {
    localStorage.setItem('gulistory_product_edits', JSON.stringify(edits));
  }

  let productEdits = loadProductEdits();

  // DOM
  const catalogDiv = document.getElementById('catalog');
  const cartContainer = document.getElementById('cartContainer');
  const totalBox = document.getElementById('totalBox');
  const totalPriceSpan = document.getElementById('totalPrice');
  const adminToggle = document.getElementById('adminToggle');
  const adminStatus = document.getElementById('adminStatus');
  const passwordPopup = document.getElementById('passwordPopup');
  const pwdInput = document.getElementById('pwdInput');
  const pwdError = document.getElementById('pwdError');
  const pwdCancel = document.getElementById('pwdCancel');
  const pwdConfirm = document.getElementById('pwdConfirm');

  // ---------- ТОВАРЫ (базовые) ----------
  const baseProducts = [
    { id: 1, category: 'bag', title: 'Сумка «Тишина»', price: 8900, material: 'натуральная кожа', desc: 'Мягкая сумка-тоут спокойного оливкового оттенка. Вместительная, с внутренним карманом.', emoji: '👜', badge: 'хит' },
    { id: 2, category: 'bag', title: 'Сумка «Шалфей»', price: 12400, material: 'замша', desc: 'Элегантная кросс-боди сумка цвета сухого шалфея. Регулируемый ремешок.', emoji: '👝', badge: 'новинка' },
    { id: 3, category: 'scarf', title: 'Платок «Луговой»', price: 4200, material: 'шёлк 100%', desc: 'Нежный платок с растительным принтом. Ручная роспись, размер 90×90 см.', emoji: '🧣', badge: '' },
    { id: 4, category: 'scarf', title: 'Платок «Мята»', price: 3800, material: 'хлопок/шёлк', desc: 'Лёгкий платок мятного оттенка. Идеален для прохладных вечеров.', emoji: '🧣', badge: '' },
    { id: 5, category: 'bag', title: 'Сумка «Роща»', price: 7600, material: 'экокожа', desc: 'Структурированная сумка глубокого зелёного цвета. Золотая фурнитура.', emoji: '👜', badge: '' },
    { id: 6, category: 'scarf', title: 'Платок «Ива»', price: 5100, material: 'кашемир', desc: 'Тёплый платок с нежным плетением. Цвет -- серебристая полынь.', emoji: '🧣', badge: 'хит' }
  ];

  // Получаем актуальные товары с учётом правок
  function getProducts() {
    return baseProducts.map(p => {
      const edit = productEdits[p.id];
      if (edit) {
        return { ...p, title: edit.title || p.title, price: edit.price !== undefined ? edit.price : p.price, desc: edit.desc || p.desc };
      }
      return p;
    });
  }

  function getProductById(id) {
    return getProducts().find(p => p.id === id);
  }

  // ---------- АДМИН-ФУНКЦИИ ----------
  function setAdminMode(enabled) {
    isAdmin = enabled;
    if (isAdmin) {
      adminToggle.textContent = 'Выйти';
      adminToggle.classList.add('active');
      adminStatus.textContent = '🔓 админ';
    } else {
      adminToggle.textContent = 'Войти';
      adminToggle.classList.remove('active');
      adminStatus.textContent = '⚪ гость';
    }
    renderCatalog();
  }

  function showPasswordPopup() {
    passwordPopup.classList.add('open');
    pwdInput.value = '';
    pwdError.classList.remove('show');
    pwdInput.focus();
  }

  function hidePasswordPopup() {
    passwordPopup.classList.remove('open');
  }

  function tryAdminLogin() {
    const entered = pwdInput.value.trim();
    if (entered === ADMIN_PASSWORD) {
      setAdminMode(true);
      hidePasswordPopup();
    } else {
      pwdError.classList.add('show');
      pwdInput.value = '';
      pwdInput.focus();
    }
  }

  // ---------- СОХРАНЕНИЕ ПРАВОК ----------
  function saveEdit(productId, field, value) {
    if (!productEdits[productId]) {
      productEdits[productId] = {};
    }
    if (field === 'price') {
      productEdits[productId].price = parseFloat(value) || 0;
    } else {
      productEdits[productId][field] = value;
    }
    saveProductEdits(productEdits);
  }

  // ---------- СОБЫТИЯ АДМИН-ПАНЕЛИ ----------
  adminToggle.addEventListener('click', function() {
    if (isAdmin) {
      setAdminMode(false);
    } else {
      showPasswordPopup();
    }
  });

  pwdCancel.addEventListener('click', hidePasswordPopup);
  pwdConfirm.addEventListener('click', tryAdminLogin);
  pwdInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') tryAdminLogin();
    if (e.key === 'Escape') hidePasswordPopup();
  });

  // ---------- ОТРИСОВКА КАТАЛОГА ----------
  function renderCatalog() {
    catalogDiv.innerHTML = '';
    const products = getProducts();
    const filtered = currentCategory === 'all'
      ? products
      : products.filter(p => p.category === currentCategory);

    if (filtered.length === 0) {
      catalogDiv.innerHTML = '<p style="text-align:center;color:#a0b0a0;padding:2rem;">Товаров пока нет</p>';
      return;
    }

    filtered.forEach(product => {
      const card = document.createElement('div');
      card.className = 'card';

      const userPhoto = photoMap.get(product.id);
      let imageStyle = '';
      if (userPhoto) {
        imageStyle = `background-image: url('${userPhoto}'); background-size: cover; background-position: center;`;
      }

      const badgeHtml = product.badge
        ? `<span class="product-badge">${product.badge}</span>`
        : '';

      const inputId = `photo-input-${product.id}`;
      const showLock = !isAdmin && userPhoto;

      // Админские поля или обычный текст
      let titleHtml, priceHtml, descHtml;
      if (isAdmin) {
        titleHtml = `
          <div style="flex:1;">
            <span class="admin-edit-label">название</span>
            <input class="admin-edit-input" id="edit-title-${product.id}" value="${escapeHtml(product.title)}" data-field="title" data-id="${product.id}">
          </div>
        `;
        priceHtml = `
          <div>
            <span class="admin-edit-label">цена</span>
            <input class="admin-edit-input admin-edit-price" id="edit-price-${product.id}" type="number" value="${product.price}" data-field="price" data-id="${product.id}" step="100" min="0">
          </div>
        `;
        descHtml = `
          <div style="margin:0.5rem 0 0.5rem 0; padding-left:0.8rem; border-left:2px dashed #5a7a5a;">
            <span class="admin-edit-label">описание</span>
            <textarea class="admin-edit-textarea" id="edit-desc-${product.id}" data-field="desc" data-id="${product.id}">${escapeHtml(product.desc)}</textarea>
          </div>
        `;
      } else {
        titleHtml = `<span>${product.title}</span>`;
        priceHtml = `<span class="price">${product.price.toLocaleString()} ₽</span>`;
        descHtml = `<div class="description">${product.desc}</div>`;
      }

      card.innerHTML = `
        <div class="product-image" style="${imageStyle}" id="image-container-${product.id}">
          ${!userPhoto ? `<span class="product-emoji">${product.emoji}</span>` : ''}
          ${badgeHtml}
          ${isAdmin ? `
            <label class="image-overlay" for="${inputId}" style="cursor:pointer;">
              <span>📷 загрузить фото</span>
            </label>
          ` : ''}
          <div class="lock-overlay ${showLock ? 'show' : ''}">🔒</div>
          ${isAdmin && userPhoto ? `<button class="reset-photo-btn" data-id="${product.id}">✕ сброс</button>` : ''}
          ${isAdmin ? `<input type="file" accept="image/*" class="photo-upload-input" id="${inputId}" data-id="${product.id}">` : ''}
        </div>
        <div class="product-title" style="${isAdmin ? 'flex-wrap:wrap; gap:0.5rem;' : ''}">
          ${titleHtml}
          ${priceHtml}
        </div>
        ${descHtml}
        <div class="details-row">
          <span class="material-tag">${product.material}</span>
          <button class="choose-btn" data-id="${product.id}">В корзину</button>
        </div>
      `;

      catalogDiv.appendChild(card);

      // ----- АДМИН: сохранение при вводе -----
      if (isAdmin) {
        const titleInput = card.querySelector(`#edit-title-${product.id}`);
        const priceInput = card.querySelector(`#edit-price-${product.id}`);
        const descInput = card.querySelector(`#edit-desc-${product.id}`);

        function onEditChange(e) {
          const id = parseInt(e.target.dataset.id);
          const field = e.target.dataset.field;
          let value = e.target.value;
          saveEdit(id, field, value);
          // Показываем индикатор
          showSaveIndicator(e.target);
        }

        if (titleInput) titleInput.addEventListener('input', onEditChange);
        if (priceInput) priceInput.addEventListener('input', onEditChange);
        if (descInput) descInput.addEventListener('input', onEditChange);
      }

      // ----- ФОТО -----
      if (isAdmin) {
        const fileInput = card.querySelector(`#${inputId}`);
        if (fileInput) {
          fileInput.addEventListener('change', function(e) {
            const file = this.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
              photoMap.set(product.id, ev.target.result);
              renderCatalog();
            };
            reader.readAsDataURL(file);
            this.value = '';
          });
        }
        const resetBtn = card.querySelector('.reset-photo-btn');
        if (resetBtn) {
          resetBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            photoMap.delete(product.id);
            renderCatalog();
          });
        }
      }

      // Кнопка "В корзину"
      const chooseBtn = card.querySelector('.choose-btn');
      chooseBtn.addEventListener('click', (e) => {
        const id = parseInt(e.currentTarget.dataset.id, 10);
        addToCart(id);
      });
    });
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showSaveIndicator(target) {
    // Удаляем старые индикаторы рядом
    const existing = target.parentElement.querySelector('.save-indicator');
    if (existing) existing.remove();
    const indicator = document.createElement('span');
    indicator.className = 'save-indicator';
    indicator.textContent = '✓ сохранено';
    target.parentElement.appendChild(indicator);
    setTimeout(() => indicator.remove(), 2000);
  }

  // ---------- КОРЗИНА ----------
  function addToCart(productId) {
    if (cart.includes(productId)) {
      alert('Этот товар уже в корзине ✧');
      return;
    }
    cart.push(productId);
    renderCart();
  }

  function removeFromCart(productId) {
    cart = cart.filter(id => id !== productId);
    renderCart();
  }

  function renderCart() {
    if (cart.length === 0) {
      cartContainer.innerHTML = '<div class="empty-cart">Вы пока ничего не выбрали</div>';
      totalBox.style.display = 'none';
      return;
    }

    totalBox.style.display = 'flex';
    let total = 0;
    let html = '';

    cart.forEach(id => {
      const product = getProductById(id);
      if (product) {
        total += product.price;
        html += `
          <div class="cart-item">
            <span>${product.emoji} ${product.title}</span>
            <span style="display:flex;align-items:center;gap:0.6rem;">
              <span style="color:#3a5a3a;font-weight:500;">${product.price.toLocaleString()} ₽</span>
              <button class="remove-btn" data-id="${product.id}">убрать</button>
            </span>
          </div>
        `;
      }
    });

    cartContainer.innerHTML = html;
    totalPriceSpan.textContent = total.toLocaleString() + ' ₽';

    document.querySelectorAll('.remove-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(e.currentTarget.dataset.id, 10);
        removeFromCart(id);
      });
    });
  }

  // ---------- ФИЛЬТРЫ ----------
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentCategory = this.dataset.category;
      renderCatalog();
    });
  });

  // ---------- СТАРТ ----------
  renderCatalog();
  renderCart();
</script>
</body>
</html>
