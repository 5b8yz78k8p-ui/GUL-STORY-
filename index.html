<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>GULISTORY</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f4f7f2;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 1rem;
      color: #2d3a2c;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .app-container { max-width: 480px; width: 100%; }
    .header { text-align: center; margin-bottom: 1.5rem; padding-top: 1rem; }
    .header h1 { font-size: 2.2rem; font-weight: 400; letter-spacing: 5px; color: #3a5a3a; text-transform: uppercase; font-family: 'Times New Roman', Georgia, serif; }
    .header .subtitle { font-size: 0.85rem; color: #6b8b6b; letter-spacing: 3px; border-top: 1px solid #c8dac8; padding-top: 0.5rem; display: inline-block; }

    .card { background: #fff; border: 1px solid #dce8dc; border-radius: 24px; padding: 1rem; margin-bottom: 1.4rem; box-shadow: 0 8px 24px rgba(60,80,60,0.06); }
    .product-image { width: 100%; height: 180px; background-size: cover; background-position: center; border-radius: 18px; margin-bottom: 0.9rem; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; background-color: #eaf2e8; position: relative; overflow: hidden; }
    .product-emoji { z-index: 2; pointer-events: none; }
    .product-badge { position: absolute; top: 10px; right: 12px; background: #ffffffdd; padding: 0.25rem 0.8rem; border-radius: 20px; font-size: 0.7rem; color: #4a6a4a; z-index: 3; }
    .product-title { font-size: 1.2rem; font-weight: 500; display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.2rem; flex-wrap: wrap; gap: 0.5rem; }
    .price { font-size: 1.1rem; font-weight: 500; color: #3a5a3a; background: #edf5ed; padding: 0.2rem 0.8rem; border-radius: 30px; }
    .description { color: #6b7d6b; font-size: 0.85rem; margin: 0.5rem 0 0.8rem; padding-left: 0.8rem; border-left: 2px solid #b4ccb4; }
    .details-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
    .material-tag { color: #8aa08a; font-size: 0.75rem; background: #f4f8f2; padding: 0.2rem 0.6rem; border-radius: 14px; }
    .choose-btn { background: #fff; border: 1.5px solid #5a7a5a; color: #3a5a3a; padding: 0.4rem 1.2rem; border-radius: 30px; cursor: pointer; font-size: 0.85rem; }
    .choose-btn:active { background: #4a6a4a; color: #fff; }
    .remove-btn { background: none; border: 1px solid #c8d8c0; color: #8a7a6a; border-radius: 20px; padding: 0.2rem 0.7rem; font-size: 0.7rem; cursor: pointer; }

    .cart-panel { margin-top: 1.5rem; background: #fff; border-radius: 24px; padding: 1.2rem; border: 1px solid #dce8dc; text-align: center; }
    .cart-panel h3 { font-size: 0.9rem; letter-spacing: 2px; color: #5a7a5a; margin-bottom: 0.5rem; text-transform: uppercase; }
    .cart-item { background: #f7faf5; border-radius: 16px; padding: 0.6rem 0.8rem; margin: 0.3rem 0; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; }
    .total-box { margin-top: 0.8rem; font-size: 1.1rem; font-weight: 500; color: #3a5a3a; display: flex; justify-content: space-between; border-top: 1px solid #dce8dc; padding-top: 0.8rem; }

    /* Платёжка - просто и чисто */
    .pay-box {
      margin-top: 1rem;
      padding: 1.2rem;
      background: #fffbe6;
      border-radius: 20px;
      border: 2px solid #FFDD2D;
      text-align: center;
    }
    .pay-box .pay-title { font-size: 0.9rem; font-weight: 600; color: #3a5a3a; margin-bottom: 0.5rem; }
    .pay-box .pay-phone {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 3px;
      color: #000;
      background: #fff;
      padding: 0.5rem 1rem;
      border-radius: 15px;
      display: inline-block;
      border: 2px dashed #4a6a4a;
      margin: 0.5rem 0;
    }
    .pay-box .pay-sum { font-size: 1.2rem; font-weight: 600; color: #4a6a4a; margin: 0.5rem 0; }
    .pay-box .pay-bank { font-size: 0.85rem; color: #888; }
    .pay-box .pay-hint { font-size: 0.75rem; color: #aaa; margin: 0.5rem 0; }

    .copy-btn {
      width: 100%;
      padding: 1rem;
      border-radius: 30px;
      border: none;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.6rem;
      transition: 0.2s;
    }
    .copy-btn:active { transform: scale(0.96); }
    .btn-num { background: #FFDD2D; color: #000; }
    .btn-sum { background: #2d3a2c; color: #fff; }

    .category-tabs { display: flex; gap: 0.4rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .tab-btn { background: #fff; border: 1px solid #d4e2d4; color: #5a7a5a; padding: 0.3rem 0.9rem; border-radius: 20px; font-size: 0.75rem; cursor: pointer; }
    .tab-btn.active { background: #4a6a4a; color: #fff; }

    .footer-note { font-size: 0.7rem; color: #a0b8a0; text-align: center; margin-top: 1rem; }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <h1>GULISTORY</h1>
    <div class="subtitle">сумки & платки</div>
  </div>

  <div class="category-tabs">
    <button class="tab-btn active" data-category="all">всё</button>
    <button class="tab-btn" data-category="bag">👜 сумки</button>
    <button class="tab-btn" data-category="scarf">🧣 платки</button>
  </div>

  <div id="catalog"></div>

  <div class="cart-panel">
    <h3>✧ корзина ✧</h3>
    <div id="cartContainer"><div style="color:#a0b0a0;padding:0.5rem;">пусто</div></div>
    <div class="total-box" id="totalBox" style="display:none;">
      <span>Итого</span>
      <span id="totalPrice">0 ₽</span>
    </div>

    <!-- ПЛАТЁЖКА -->
    <div class="pay-box" id="payBox" style="display:none;">
      <div class="pay-title">💳 Перевод на номер:</div>
      <div class="pay-phone">89280048199</div>
      <div class="pay-bank">Т-Банк (Тинькофф)</div>
      <div class="pay-sum">Сумма: <span id="paySum">0 ₽</span></div>
      <div class="pay-hint">Открой приложение банка → Перевод по номеру телефона</div>
      <button class="copy-btn btn-num" id="copyPhone">📋 Скопировать номер</button>
      <button class="copy-btn btn-sum" id="copyAll">📋 Скопировать номер и сумму</button>
    </div>
  </div>
  <div class="footer-note">gulistory — тихая роскошь</div>
</div>

<script>
  const SELLER_PHONE = '89280048199';
  let cart = [];
  let currentCategory = 'all';

  const products = [
    { id: 1, category: 'bag', title: 'Сумка «Тишина»', price: 8900, material: 'натуральная кожа', desc: 'Мягкая сумка-тоут оливкового оттенка.', emoji: '👜', badge: 'хит' },
    { id: 2, category: 'bag', title: 'Сумка «Шалфей»', price: 12400, material: 'замша', desc: 'Кросс-боди цвета сухого шалфея.', emoji: '👝', badge: 'новинка' },
    { id: 3, category: 'scarf', title: 'Платок «Луговой»', price: 4200, material: 'шёлк 100%', desc: 'Нежный платок с принтом. 90×90 см.', emoji: '🧣', badge: '' },
    { id: 4, category: 'scarf', title: 'Платок «Мята»', price: 3800, material: 'хлопок/шёлк', desc: 'Лёгкий платок мятного оттенка.', emoji: '🧣', badge: '' },
    { id: 5, category: 'bag', title: 'Сумка «Роща»', price: 7600, material: 'экокожа', desc: 'Структурированная сумка зелёного цвета.', emoji: '👜', badge: '' },
    { id: 6, category: 'scarf', title: 'Платок «Ива»', price: 5100, material: 'кашемир', desc: 'Тёплый платок, серебристая полынь.', emoji: '🧣', badge: 'хит' }
  ];

  function getProductById(id) { return products.find(p => p.id === id); }
  function getTotal() { return cart.reduce((s, id) => { const p = getProductById(id); return s + (p ? p.price : 0); }, 0); }

  // КАТАЛОГ
  function renderCatalog() {
    const div = document.getElementById('catalog');
    div.innerHTML = '';
    const filtered = currentCategory === 'all' ? products : products.filter(p => p.category === currentCategory);
    filtered.forEach(p => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="product-image" style="background-color:#eaf2e8;">
          <span class="product-emoji">${p.emoji}</span>
          ${p.badge ? `<span class="product-badge">${p.badge}</span>` : ''}
        </div>
        <div class="product-title">
          <span>${p.title}</span>
          <span class="price">${p.price.toLocaleString()} ₽</span>
        </div>
        <div class="description">${p.desc}</div>
        <div class="details-row">
          <span class="material-tag">${p.material}</span>
          <button class="choose-btn" data-id="${p.id}">В корзину</button>
        </div>
      `;
      div.appendChild(card);
      card.querySelector('.choose-btn').addEventListener('click', () => {
        if (!cart.includes(p.id)) { cart.push(p.id); renderCart(); }
      });
    });
  }

  // КОРЗИНА
  function renderCart() {
    const cont = document.getElementById('cartContainer');
    const tb = document.getElementById('totalBox');
    const pb = document.getElementById('payBox');
    
    if (cart.length === 0) {
      cont.innerHTML = '<div style="color:#a0b0a0;padding:0.5rem;">пусто</div>';
      tb.style.display = 'none';
      pb.style.display = 'none';
      return;
    }
    
    tb.style.display = 'flex';
    pb.style.display = 'block';
    
    const total = getTotal();
    document.getElementById('totalPrice').textContent = total.toLocaleString() + ' ₽';
    document.getElementById('paySum').textContent = total.toLocaleString() + ' ₽';
    
    cont.innerHTML = cart.map(id => {
      const p = getProductById(id);
      return p ? `<div class="cart-item"><span>${p.emoji} ${p.title}</span><span>${p.price.toLocaleString()} ₽ <button class="remove-btn" data-id="${p.id}">убрать</button></span></div>` : '';
    }).join('');
    
    document.querySelectorAll('.remove-btn').forEach(b => {
      b.addEventListener('click', () => {
        cart = cart.filter(i => i !== +b.dataset.id);
        renderCart();
      });
    });
  }

  // КНОПКИ
  document.getElementById('copyPhone').addEventListener('click', () => {
    navigator.clipboard.writeText(SELLER_PHONE).then(() => {
      alert('✅ Номер скопирован: ' + SELLER_PHONE + '\n\nОткрой Т-Банк → Перевод по номеру телефона → Вставь.');
    });
  });

  document.getElementById('copyAll').addEventListener('click', () => {
    const total = getTotal();
    const text = SELLER_PHONE + ' — ' + total + '₽';
    navigator.clipboard.writeText(text).then(() => {
      alert('✅ Скопировано: ' + text + '\n\nОткрой Т-Банк и вставь.');
    });
  });

  // ФИЛЬТРЫ
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.addEventListener('click', function() {
      document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
      this.classList.add('active');
      currentCategory = this.dataset.category;
      renderCatalog();
    });
  });

  renderCatalog();
  renderCart();
</script>
</body>
</html>
